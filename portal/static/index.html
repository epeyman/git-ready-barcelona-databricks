<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Schwarz Git Ready Barcelona Hackathon data portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root { color-scheme: light; }
      body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
      .chip { @apply text-xs px-2 py-0.5 rounded-full bg-slate-100 text-slate-700 border border-slate-200 mr-1 mb-1 inline-block; }
      .pill { @apply text-xs px-2 py-0.5 rounded-full bg-indigo-50 text-indigo-700 border border-indigo-200; }
      pre { white-space: pre-wrap; word-break: break-word; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "preact": "https://esm.sh/preact@10.22.0",
          "preact/hooks": "https://esm.sh/preact@10.22.0/hooks",
          "htm/preact": "https://esm.sh/htm@3.1.1/preact?deps=preact@10.22.0"
        }
      }
    </script>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div id="app"></div>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
