version: 0.2.0.dev0
semantic_model:
- name: lidlplus_transactions_mv
  description: "lidlplus loyalty transactions semantic model \u2014 synthetic demo\
    \ data"
  ai_context:
    instructions: Use these metrics for any quantitative question about lidlplus basket
      transactions, loyalty engagement, or store-level performance.
  datasets:
  - name: lidlplus_transactions_mv
    source: peymandemoaws_catalog.osi_demo.lidlplus_transactions
    fields:
    - name: country
      expression:
        dialects:
        - dialect: DATABRICKS
          expression: country
      description: Country code (DE, FR, ES, PL, IT)
      dimension:
        is_time: false
      ai_context:
        synonyms:
        - market
        - country code
        - geo
    - name: store_id
      expression:
        dialects:
        - dialect: DATABRICKS
          expression: store_id
      description: Store identifier
      dimension:
        is_time: false
      ai_context:
        synonyms:
        - store
        - shop
        - branch
    - name: loyalty_tier
      expression:
        dialects:
        - dialect: DATABRICKS
          expression: loyalty_tier
      description: Loyalty tier (none, bronze, silver, gold)
      dimension:
        is_time: false
      ai_context:
        synonyms:
        - tier
        - loyalty level
        - membership
    - name: payment_method
      expression:
        dialects:
        - dialect: DATABRICKS
          expression: payment_method
      description: Payment method (cash, card, lidlpay)
      dimension:
        is_time: false
      ai_context:
        synonyms:
        - payment
        - tender
    - name: transaction_date
      expression:
        dialects:
        - dialect: DATABRICKS
          expression: transaction_date
      description: Date of the transaction
      dimension:
        is_time: true
      ai_context:
        synonyms:
        - date
        - day
        - when
  metrics:
  - name: total_revenue
    expression:
      dialects:
      - dialect: DATABRICKS
        expression: SUM(total_amount)
    description: Sum of total_amount across transactions
    ai_context:
      synonyms:
      - revenue
      - sales
      - gmv
      - top line
  - name: transaction_count
    expression:
      dialects:
      - dialect: DATABRICKS
        expression: COUNT(*)
    description: Number of transactions
    ai_context:
      synonyms:
      - transactions
      - baskets
      - tickets
  - name: avg_basket
    expression:
      dialects:
      - dialect: DATABRICKS
        expression: AVG(total_amount)
    description: Mean of total_amount across transactions
    ai_context:
      synonyms:
      - average basket
      - basket size
      - aov
  - name: unique_customers
    expression:
      dialects:
      - dialect: DATABRICKS
        expression: COUNT(DISTINCT customer_id)
    description: Distinct customers transacting in the period
    ai_context:
      synonyms:
      - distinct customers
      - unique shoppers
  custom_extensions:
  - vendor_name: DATABRICKS
    data: '{"metric_view_fqn":"peymandemoaws_catalog.osi_demo.lidlplus_transactions_mv","version":0.1,"query_pattern":"SELECT
      MEASURE(<metric>), <dims> FROM <fqn> WHERE <filters> GROUP BY <dims>"}'
