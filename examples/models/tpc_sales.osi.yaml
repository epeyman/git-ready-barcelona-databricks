version: 0.2.0.dev0
semantic_model:
- name: tpc_sales_mv
  description: "TPC benchmark sales line-items semantic model \u2014 OSI demo"
  ai_context:
    instructions: Use these metrics for any quantitative question about TPC benchmark
      sales line items (revenue, units, discounts).
  datasets:
  - name: tpc_sales_mv
    source: samples.tpch.lineitem
    fields:
    - name: ship_mode
      expression:
        dialects:
        - dialect: DATABRICKS
          expression: l_shipmode
      description: "Line-item shipping mode (AIR, TRUCK, \u2026)"
      dimension:
        is_time: false
      ai_context:
        synonyms:
        - shipping mode
        - shipping channel
    - name: return_flag
      expression:
        dialects:
        - dialect: DATABRICKS
          expression: l_returnflag
      description: Return status of the line item (R = returned, N/A otherwise)
      dimension:
        is_time: false
      ai_context:
        synonyms:
        - return status
        - returned
    - name: ship_date
      expression:
        dialects:
        - dialect: DATABRICKS
          expression: l_shipdate
      description: Ship date of the line item
      dimension:
        is_time: true
      ai_context:
        synonyms:
        - date
        - day
        - when
        - ship date
  metrics:
  - name: net_sales
    expression:
      dialects:
      - dialect: DATABRICKS
        expression: SUM(l_extendedprice * (1 - l_discount))
    description: Sum of extended price net of discount
    ai_context:
      synonyms:
      - net revenue
      - sales
      - net
  - name: gross_sales
    expression:
      dialects:
      - dialect: DATABRICKS
        expression: SUM(l_extendedprice)
    description: Sum of extended price (before discount)
    ai_context:
      synonyms:
      - gross revenue
      - gross
  - name: units_sold
    expression:
      dialects:
      - dialect: DATABRICKS
        expression: SUM(l_quantity)
    description: Sum of quantity across line items
    ai_context:
      synonyms:
      - units
      - quantity
      - volume
  - name: line_count
    expression:
      dialects:
      - dialect: DATABRICKS
        expression: COUNT(*)
    description: Number of line items
    ai_context:
      synonyms:
      - rows
      - line items
      - count
  custom_extensions:
  - vendor_name: DATABRICKS
    data: '{"metric_view_fqn":"peymandemoaws_catalog.osi_demo.tpc_sales_mv","version":0.1,"query_pattern":"SELECT
      MEASURE(<metric>), <dims> FROM <fqn> WHERE <filters> GROUP BY <dims>"}'
