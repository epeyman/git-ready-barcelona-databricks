version: 0.2.0.dev0
semantic_model:
- name: orders_mv
  description: "Sales orders semantic model \u2014 OSI demo"
  ai_context:
    instructions: Semantic model exported from a Databricks Metric View on TPC-H orders.
      Use the metrics here for any quantitative question about orders or revenue.
  datasets:
  - name: orders_mv
    source: samples.tpch.orders
    fields:
    - name: order_priority
      expression:
        dialects:
        - dialect: DATABRICKS
          expression: o_orderpriority
      description: "TPC-DS order priority \u2014 1-URGENT through 5-LOW"
      dimension:
        is_time: false
      ai_context:
        synonyms:
        - priority
        - urgency
    - name: order_status
      expression:
        dialects:
        - dialect: DATABRICKS
          expression: o_orderstatus
      description: O = open, F = fulfilled, P = in-progress
      dimension:
        is_time: false
      ai_context:
        synonyms:
        - status
        - state
    - name: clerk
      expression:
        dialects:
        - dialect: DATABRICKS
          expression: o_clerk
      description: Clerk who processed the order
      dimension:
        is_time: false
    - name: order_date
      expression:
        dialects:
        - dialect: DATABRICKS
          expression: o_orderdate
      description: Date the order was placed
      dimension:
        is_time: true
      ai_context:
        synonyms:
        - date
        - when
        - period
  metrics:
  - name: total_revenue
    expression:
      dialects:
      - dialect: DATABRICKS
        expression: SUM(o_totalprice)
    description: Sum of order totals across all orders
    ai_context:
      synonyms:
      - revenue
      - sales
      - gmv
      - top line
  - name: order_count
    expression:
      dialects:
      - dialect: DATABRICKS
        expression: COUNT(*)
    description: Distinct count of orders
    ai_context:
      synonyms:
      - orders
      - number of orders
      - volume
  - name: avg_order_value
    expression:
      dialects:
      - dialect: DATABRICKS
        expression: AVG(o_totalprice)
    description: Mean of o_totalprice across orders
    ai_context:
      synonyms:
      - aov
      - average sale
      - basket size
  custom_extensions:
  - vendor_name: DATABRICKS
    data: '{"metric_view_fqn":"peymandemoaws_catalog.osi_demo.orders_mv","version":0.1,"query_pattern":"SELECT
      MEASURE(<metric>), <dims> FROM <fqn> WHERE <filters> GROUP BY <dims>"}'
