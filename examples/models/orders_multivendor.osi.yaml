version: 0.2.0.dev0
semantic_model:
- name: orders_multivendor_mv
  description: TPC-H orders contract addressable on three engines simultaneously.
  ai_context:
    instructions: "Use these metrics for any quantitative question about orders or\
      \ revenue. The same semantic contract is served by Databricks (default), Dremio,\
      \ or Strategy Mosaic \u2014 pick via the engine argument."
  datasets:
  - name: orders_mv
    source: samples.tpch.orders
    fields:
    - name: order_priority
      expression:
        dialects:
        - dialect: DATABRICKS
          expression: o_orderpriority
        - dialect: ANSI_SQL
          expression: o_orderpriority
      description: "TPC-DS order priority \u2014 1-URGENT through 5-LOW"
      dimension:
        is_time: false
      ai_context:
        synonyms:
        - priority
        - urgency
    - name: order_status
      expression:
        dialects:
        - dialect: DATABRICKS
          expression: o_orderstatus
        - dialect: ANSI_SQL
          expression: o_orderstatus
      description: O = open, F = fulfilled, P = in-progress
      dimension:
        is_time: false
      ai_context:
        synonyms:
        - status
        - state
    - name: clerk
      expression:
        dialects:
        - dialect: DATABRICKS
          expression: o_clerk
        - dialect: ANSI_SQL
          expression: o_clerk
      description: Clerk who processed the order
      dimension:
        is_time: false
    - name: order_date
      expression:
        dialects:
        - dialect: DATABRICKS
          expression: o_orderdate
        - dialect: ANSI_SQL
          expression: o_orderdate
      description: Date the order was placed
      dimension:
        is_time: true
      ai_context:
        synonyms:
        - date
        - when
        - period
  metrics:
  - name: total_revenue
    expression:
      dialects:
      - dialect: DATABRICKS
        expression: SUM(o_totalprice)
      - dialect: ANSI_SQL
        expression: SUM(o_totalprice)
    description: Sum of order totals across all orders
    ai_context:
      synonyms:
      - revenue
      - sales
      - gmv
      - top line
  - name: order_count
    expression:
      dialects:
      - dialect: DATABRICKS
        expression: COUNT(*)
      - dialect: ANSI_SQL
        expression: COUNT(*)
    description: Distinct count of orders
    ai_context:
      synonyms:
      - orders
      - number of orders
      - volume
  - name: avg_order_value
    expression:
      dialects:
      - dialect: DATABRICKS
        expression: AVG(o_totalprice)
      - dialect: ANSI_SQL
        expression: AVG(o_totalprice)
    description: Mean of o_totalprice across orders
    ai_context:
      synonyms:
      - aov
      - average sale
      - basket size
  custom_extensions:
  - vendor_name: DATABRICKS
    data: '{"metric_view_fqn":"peymandemoaws_catalog.osi_demo.orders_mv","version":"1.1","query_pattern":"SELECT
      MEASURE(<metric>), <dims> FROM <fqn> WHERE <filters> GROUP BY <dims>"}'
  - vendor_name: DREMIO
    data: '{"table":"tpc_h.orders","comment":"Set DREMIO_BASE_URL/DREMIO_TOKEN to
      execute; otherwise the adapter returns the rendered SQL."}'
  - vendor_name: STRATEGY
    data: '{"metric_set_id":"tpch-orders-metric-set","metric_id_map":{"total_revenue":"rev.orders.total","order_count":"rev.orders.count","avg_order_value":"rev.orders.aov","urgent_revenue":"rev.orders.urgent","distinct_customers":"rev.orders.unique_customers"},"attribute_id_map":{"order_priority":"attr.orders.priority","order_status":"attr.orders.status","clerk":"attr.orders.clerk","order_date":"attr.orders.date"}}'
