version: 0.2.0.dev0
semantic_model:
- name: nyctaxi_trips_mv
  description: "NYC yellow-cab trips semantic model \u2014 OSI demo on samples.nyctaxi.trips"
  ai_context:
    instructions: Use these metrics for any quantitative question about NYC taxi trips,
      fares, or distances.
  datasets:
  - name: nyctaxi_trips_mv
    source: samples.nyctaxi.trips
    fields:
    - name: pickup_zip
      expression:
        dialects:
        - dialect: DATABRICKS
          expression: pickup_zip
      description: Pickup ZIP code
      dimension:
        is_time: false
      ai_context:
        synonyms:
        - origin zip
        - pickup location
        - from
    - name: dropoff_zip
      expression:
        dialects:
        - dialect: DATABRICKS
          expression: dropoff_zip
      description: Drop-off ZIP code
      dimension:
        is_time: false
      ai_context:
        synonyms:
        - destination zip
        - drop off location
        - to
    - name: pickup_date
      expression:
        dialects:
        - dialect: DATABRICKS
          expression: CAST(tpep_pickup_datetime AS DATE)
      description: Date of pickup (calendar day)
      dimension:
        is_time: true
      ai_context:
        synonyms:
        - date
        - day
        - when
  metrics:
  - name: total_fare
    expression:
      dialects:
      - dialect: DATABRICKS
        expression: SUM(fare_amount)
    description: Sum of fare_amount across trips
    ai_context:
      synonyms:
      - revenue
      - fares
      - total fare
  - name: trip_count
    expression:
      dialects:
      - dialect: DATABRICKS
        expression: COUNT(*)
    description: Number of trips
    ai_context:
      synonyms:
      - trips
      - rides
      - volume
  - name: avg_fare
    expression:
      dialects:
      - dialect: DATABRICKS
        expression: AVG(fare_amount)
    description: Mean of fare_amount across trips
    ai_context:
      synonyms:
      - average fare
      - mean fare
  - name: avg_trip_distance
    expression:
      dialects:
      - dialect: DATABRICKS
        expression: AVG(trip_distance)
    description: Mean of trip_distance across trips
    ai_context:
      synonyms:
      - average distance
      - mean trip distance
  custom_extensions:
  - vendor_name: DATABRICKS
    data: '{"metric_view_fqn":"peymandemoaws_catalog.osi_demo.nyctaxi_trips_mv","version":0.1,"query_pattern":"SELECT
      MEASURE(<metric>), <dims> FROM <fqn> WHERE <filters> GROUP BY <dims>"}'
