# yaml-language-server: $schema=https://raw.githubusercontent.com/open-semantic-interchange/OSI/main/core-spec/osi-schema.json
#
# OSI core spec compliant (validated against core-spec/osi-schema.json).
# Semantically equivalent to ./orders.metric_view.yaml — same fields, same
# expressions, same measures — expressed in OSI's vendor-neutral shape.
#
# Notes on Databricks-specific bits:
#   - The native Metric View has `filter: o_orderstatus IN ('O','F','P')` and
#     a FILTER (WHERE …) measure. OSI core does not define a dataset-level
#     `filter` or a per-metric `filter`, so both ride along under
#     custom_extensions with vendor_name "DATABRICKS" and a JSON-encoded
#     `data` payload, as the spec requires.

version: "0.2.0.dev0"

semantic_model:
  - name: orders_mv
    description: TPC-H orders semantic model — sales orders rolled up by priority, status, clerk, and date
    ai_context:
      instructions: |
        Use this semantic model for any quantitative question about orders or revenue.
        Backed by samples.tpch.orders. Sourced from a Databricks Unity Catalog Metric View.

    datasets:
      - name: orders_mv
        source: samples.tpch.orders
        description: TPC-H orders fact table (samples.tpch.orders)
        ai_context:
          synonyms:
            - "sales orders"
            - "orders fact"

        fields:
          - name: order_priority
            expression:
              dialects:
                - dialect: DATABRICKS
                  expression: o_orderpriority
            description: TPC-DS order priority (1-URGENT through 5-LOW)
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "priority"
                - "urgency"

          - name: order_status
            expression:
              dialects:
                - dialect: DATABRICKS
                  expression: o_orderstatus
            description: 'O = Open, F = Fulfilled, P = In-progress'
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "status"
                - "state"

          - name: clerk
            expression:
              dialects:
                - dialect: DATABRICKS
                  expression: o_clerk
            description: Clerk who processed the order
            dimension:
              is_time: false

          - name: order_date
            expression:
              dialects:
                - dialect: DATABRICKS
                  expression: o_orderdate
            description: Order placement date
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "date"
                - "when"
                - "period"

    metrics:
      - name: total_revenue
        expression:
          dialects:
            - dialect: DATABRICKS
              expression: SUM(o_totalprice)
        description: Sum of order totals across all orders
        ai_context:
          synonyms:
            - "revenue"
            - "sales"
            - "gmv"
            - "top line"

      - name: order_count
        expression:
          dialects:
            - dialect: DATABRICKS
              expression: COUNT(*)
        description: Number of orders
        ai_context:
          synonyms:
            - "orders"
            - "volume"

      - name: distinct_customers
        expression:
          dialects:
            - dialect: DATABRICKS
              expression: COUNT(DISTINCT o_custkey)
        description: Number of distinct customers placing orders
        ai_context:
          synonyms:
            - "unique customers"
            - "distinct customers"

      - name: avg_order_value
        expression:
          dialects:
            - dialect: DATABRICKS
              expression: AVG(o_totalprice)
        description: Average order total
        ai_context:
          synonyms:
            - "aov"
            - "average order"

      - name: urgent_revenue
        expression:
          dialects:
            - dialect: DATABRICKS
              expression: SUM(o_totalprice) FILTER (WHERE o_orderpriority = '1-URGENT')
        description: Total revenue from urgent-priority orders only
        ai_context:
          synonyms:
            - "urgent sales"
            - "p1 revenue"

    custom_extensions:
      - vendor_name: "DATABRICKS"
        data: |
          {
            "metric_view_fqn": "peymandemoaws_catalog.osi_demo.orders_mv",
            "version": "1.1",
            "filter": "o_orderstatus IN ('O','F','P')",
            "query_pattern": "SELECT MEASURE(<metric>), <dims> FROM <fqn> WHERE <filters> GROUP BY <dims>"
          }
